name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    if: github.event.repository.fork == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get semantic release info
        id: semantic_release_info
        uses: cycjimmy/semantic-release-action@v6
        with:
          dry_run: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version file
        if: ${{ steps.semantic_release_info.outputs.new_release_published == 'true' }}
        env:
          NEW_VERSION: ${{ steps.semantic_release_info.outputs.new_release_version }}
        run: |
          echo "Version: $NEW_VERSION"
          sed -i "s/^version = \".*\"/version = \"$NEW_VERSION\"/g" pyproject.toml

      - name: Set up Python
        if: ${{ steps.semantic_release_info.outputs.new_release_published == 'true' }}
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Build package
        if: ${{ steps.semantic_release_info.outputs.new_release_published == 'true' }}
        uses: hynek/build-and-inspect-python-package@v2

      - name: Download built package
        if: ${{ steps.semantic_release_info.outputs.new_release_published == 'true' }}
        uses: actions/download-artifact@v8
        with:
          name: Packages
          path: dist

      - name: Publish distribution to PyPI
        if: ${{ steps.semantic_release_info.outputs.new_release_published == 'true' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Update Version and Commit
        if: ${{ steps.semantic_release_info.outputs.new_release_published == 'true' }}
        env:
          NEW_VERSION: ${{ steps.semantic_release_info.outputs.new_release_version }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git diff
          git add pyproject.toml
          if ! git diff --cached --quiet; then
            git commit -m "chore: bumping version to $NEW_VERSION [skip ci]"
          fi

      - name: Tag release
        if: ${{ steps.semantic_release_info.outputs.new_release_published == 'true' }}
        env:
          NEW_GIT_TAG: ${{ steps.semantic_release_info.outputs.new_release_git_tag }}
        run: |
          if ! git rev-parse -q --verify "refs/tags/$NEW_GIT_TAG" >/dev/null; then
            git tag "$NEW_GIT_TAG"
          fi

      - name: Push changes
        if: ${{ steps.semantic_release_info.outputs.new_release_published == 'true' }}
        uses: ad-m/github-push-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
          tags: true

      - name: Create GitHub Release
        if: ${{ steps.semantic_release_info.outputs.new_release_published == 'true' }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.semantic_release_info.outputs.new_release_git_tag }}
          name: ${{ steps.semantic_release_info.outputs.new_release_git_tag }}
          body: ${{ steps.semantic_release_info.outputs.new_release_notes }}
          draft: false
          prerelease: false
